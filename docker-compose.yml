version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override index dir to point inside the mounted volume
      INDEX_DIR: /app/data/processed
    volumes:
      # Persist FAISS indexes and BM25 state across container restarts
      - rag_data:/app/data
      # Mount HuggingFace model cache so weights survive rebuilds
      - hf_cache:/app/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 90s   # Allow time for model downloads on first run
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rag_data:
  hf_cache:
  redis_data:
